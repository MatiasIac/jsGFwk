<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Spectrum Renderer Demo</title>
    <style>
        :root {
            color-scheme: only light;
            --bg-0: #101419;
            --bg-1: #1e2730;
            --panel: #0f141b;
            --line: #2f4052;
            --text: #d7e2ef;
            --text-subtle: #8ea2b7;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Trebuchet MS", "Verdana", sans-serif;
            color: var(--text);
            background:
                radial-gradient(1200px 800px at 15% 10%, #243346 0%, transparent 60%),
                radial-gradient(900px 700px at 85% 95%, #1f2f42 0%, transparent 55%),
                linear-gradient(180deg, var(--bg-0), var(--bg-1));
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .layout {
            width: min(980px, 100%);
            display: grid;
            gap: 16px;
            grid-template-columns: 1fr;
        }

        .panel {
            border: 1px solid var(--line);
            background: linear-gradient(180deg, #121923, var(--panel));
            border-radius: 10px;
            padding: 12px;
        }

        .label {
            margin: 0 0 10px;
            font-size: 13px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--text-subtle);
        }

        #canvas {
            width: min(100%, 768px);
            height: auto;
            display: block;
            margin: 0 auto;
            image-rendering: pixelated;
            border: 1px solid #253242;
            background: black;
        }

        .notes {
            margin: 0;
            line-height: 1.45;
            font-size: 14px;
            color: var(--text-subtle);
        }

        @media (max-width: 820px) {
            #canvas {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="layout">
        <section class="panel">
            <p class="label">ZX Spectrum-style renderer demo</p>
            <canvas id="canvas" width="768" height="576"></canvas>
        </section>
        <section class="panel">
            <p class="notes">
                The hero sprite is drawn at pixel coordinates while colours remain locked to 8x8 attribute blocks.
                As it crosses grass cells, attribute overwrite mode produces classic colour clash.
            </p>
        </section>
    </div>
    <script src="../dist/jsgfwk-bundle.js"></script>
    <script type="module" src="./main.js"></script>
</body>
</html>
